      html { background: #f1f5f9; transition: background 400ms ease; }
      html.dark { background: #020617; }
      body {
        font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .brand-wordmark {
        font-family: "Syne", ui-sans-serif, system-ui, sans-serif;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      /* ── Keyframes ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes checkPop {
        0%   { opacity: 0; transform: scale(0.2); }
        60%  { opacity: 1; transform: scale(1.15); }
        80%  { transform: scale(0.96); }
        100% { transform: scale(1); }
      }
      @keyframes ringPulse {
        0%   { transform: scale(0.6); opacity: 0.5; }
        100% { transform: scale(2.2); opacity: 0; }
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      @keyframes pulseToday {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.35); }
        50%      { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
      }
      @keyframes splashOut {
        0%, 70% { opacity: 1; transform: scale(1); }
        100%    { opacity: 0; transform: scale(1.08); pointer-events: none; }
      }
      @keyframes logoFloat {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-4px); }
      }
      @keyframes scanLine {
        0%   { top: 12%; opacity: 0; }
        15%  { opacity: 1; }
        85%  { opacity: 1; }
        100% { top: 88%; opacity: 0; }
      }
      @keyframes confettiFall {
        0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(520px) rotate(720deg); opacity: 0; }
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translate(-50%, 20px); }
        to   { opacity: 1; transform: translate(-50%, 0); }
      }
      @keyframes aiShine {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes slotPulse {
        0%   { box-shadow: 0 0 0 0 rgba(26, 86, 219, 0.45); }
        100% { box-shadow: 0 0 0 12px rgba(26, 86, 219, 0); }
      }

      .screen-enter    { animation: fadeInUp 320ms cubic-bezier(0.16, 1, 0.3, 1); }
      .check-celebrate { animation: checkPop 700ms cubic-bezier(0.16, 1, 0.3, 1) both; }
      .celebrate-ring {
        position: absolute; inset: 0; border-radius: 9999px;
        border: 3px solid #1A56DB; animation: ringPulse 900ms ease-out both;
      }
      .sheet-enter  { animation: slideUp 280ms cubic-bezier(0.16, 1, 0.3, 1); }
      .pulse-today  { animation: pulseToday 2s ease-out infinite; }
      .splash       { animation: splashOut 1400ms ease forwards; }
      .logo-float   { animation: logoFloat 3s ease-in-out infinite; }
      .slot-pulse   { animation: slotPulse 600ms ease-out; }
      .toast-in     { animation: toastIn 240ms cubic-bezier(0.16, 1, 0.3, 1); }

      .press { transition: transform 120ms ease, box-shadow 160ms ease, background 160ms ease; }
      .press:active { transform: scale(0.96); }
      .lift { transition: transform 160ms ease, box-shadow 200ms ease; }
      .lift:hover { transform: translateY(-1px); }

      .scan-host { position: relative; overflow: hidden; }
      .scan-line {
        position: absolute; left: 6%; right: 6%;
        height: 2px; border-radius: 2px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
        box-shadow: 0 0 12px rgba(255,255,255,0.6);
        animation: scanLine 1400ms ease-in-out forwards;
      }

      .ai-sheen {
        background: linear-gradient(90deg,
          rgba(26,86,219,0.12) 0%, rgba(99,102,241,0.22) 50%, rgba(26,86,219,0.12) 100%);
        background-size: 200% 100%;
        animation: aiShine 3.2s ease-in-out infinite;
      }

      .confetti-piece {
        position: absolute;
        width: 8px; height: 12px;
        border-radius: 2px;
        will-change: transform, opacity;
        animation: confettiFall 1800ms ease-out forwards;
      }

      .noscroll::-webkit-scrollbar { display: none; }
      .noscroll { scrollbar-width: none; }

      .theme-transition, .theme-transition * {
        transition: background-color 260ms ease, color 260ms ease, border-color 260ms ease;
      }

      /* ─── Date helpers ─── */
      const startOfDay = (d) => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
      const addDays    = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
      const dateKey    = (d) => {
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,"0");
        const day = String(d.getDate()).padStart(2,"0");
        return `${y}-${m}-${day}`;
      };
      const sameDay    = (a, b) => dateKey(a) === dateKey(b);

      /* Deterministic slot generator per clinic+date */
      const ALL_TIMES = ["08:30","09:00","09:30","10:00","10:30","11:00","11:30",
                         "14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30"];
      const hashStr = (s) => {
        let h = 0;
        for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
        return Math.abs(h);
      };
      const slotsFor = (clinic, date, bookedSet) => {
        const k = `${clinic.id}-${dateKey(date)}`;
        const h = hashStr(k) + (clinic.seed || 1);
        const weekday = date.getDay();
        if (weekday === 0) return [];                // Sun closed
        if (weekday === 6 && h % 3 === 0) return []; // some Sat closed
        if (h % 9 === 0) return [];                  // occasional off day
        const count = 3 + (h % 6);                   // 3..8 slots
        const picks = new Set();
        for (let i = 0; i < 40 && picks.size < count; i++) {
          picks.add(ALL_TIMES[(h + i * 7) % ALL_TIMES.length]);
        }
        const list = Array.from(picks).sort();
        return list.filter((t) => !bookedSet.has(`${clinic.id}|${dateKey(date)}|${t}`));
      };
      const totalSlotsFor = (clinic, date) => {
        const k = `${clinic.id}-${dateKey(date)}`;
        const h = hashStr(k) + (clinic.seed || 1);
        const weekday = date.getDay();
        if (weekday === 0) return 0;
        if (weekday === 6 && h % 3 === 0) return 0;
        if (h % 9 === 0) return 0;
        return 3 + (h % 6);
      };

      function LokktPatientDemo() {
        const [role, setRole]                 = useState(null);   // null | "patient" | "clinic"

        const [screen, setScreen]             = useState("home");
        const [tab, setTab]                   = useState("home");
        const [lang, setLang]                 = useState("EN");
        const [query, setQuery]               = useState("");
        const [activeClinic, setActiveClinic] = useState(null);
        const [activeDate, setActiveDate]     = useState(null);
        const [activeSlot, setActiveSlot]     = useState(null);
        const [bookings, setBookings]         = useState([]);
        const [blocked, setBlocked]           = useState(new Set()); // "clinicId|date|slot"
        const [darkMode, setDarkMode]         = useState(false);
        const [showSplash, setShowSplash]     = useState(true);
        const [toast, setToast]               = useState(null);
        const [notifs, setNotifs]             = useState({ appt:true, promo:false });
        const [insurance, setInsurance]       = useState("CSS");

        const t = I18N[lang];

        const bookedSet = useMemo(() => {
          const s = new Set();
          bookings.forEach((b) => s.add(`${b.clinicId}|${b.date}|${b.slot}`));
          blocked.forEach((k) => s.add(k));
          return s;
        }, [bookings, blocked]);

        useEffect(() => {
          if (darkMode) document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
        }, [darkMode]);

        useEffect(() => {
          const timer = setTimeout(() => setShowSplash(false), 1400);
          return () => clearTimeout(timer);
        }, []);

        const showToast = (msg) => setToast(msg);
        const goSearch  = () => setScreen("search");
        const goClinic  = (id, date) => {
          setActiveClinic(id);
          setActiveDate(date || null);
          setScreen("clinic");
        };
        const goConfirm = (id, date, slot) => {
          setActiveClinic(id); setActiveSlot(slot); setActiveDate(date);
          setBookings((b) => [{ id:`b-${Date.now()}`, clinicId:id, date:dateKey(date), slot }, ...b]);
          setScreen("confirmed");
        };
        const goHome  = () => { setScreen("home"); setTab("home"); };
        const goAppts = () => { setScreen("appointments"); setTab("appts"); };

        const cancelBooking = (b) => {
          setBookings((list) => list.filter((x) =>
            (x.id || `${x.clinicId}|${x.date}|${x.slot}`) !== (b.id || `${b.clinicId}|${b.date}|${b.slot}`)
          ));
          showToast(t.apptCancelled);
        };
        const rescheduleBooking = (b) => {
          setBookings((list) => list.filter((x) =>
            (x.id || `${x.clinicId}|${x.date}|${x.slot}`) !== (b.id || `${b.clinicId}|${b.date}|${b.slot}`)
          ));
          setActiveClinic(b.clinicId);
          setActiveDate(new Date(b.date));
          setScreen("clinic");
          showToast(t.rebooked);
        };

        const toggleBlock = (cid, date, slot) => {
          const key = `${cid}|${date}|${slot}`;
          setBlocked((prev) => {
            const next = new Set(prev);
            if (next.has(key)) { next.delete(key); showToast(t.clinicUnblockedToast); }
            else               { next.add(key);    showToast(t.clinicBlockedToast); }
            return next;
          });
        };

        const logoutPatient = () => {
          showToast(t.loggedOut);
          setTimeout(() => {
            setRole(null); setClinicUserId(null);
            setScreen("home"); setTab("home");
            setActiveClinic(null); setActiveDate(null); setActiveSlot(null);
            setQuery("");
          }, 400);
        };
        const logoutClinic = () => {
          showToast(t.clinicSignedOut);
          setTimeout(() => {
            setRole(null); setClinicUserId(null);
            setScreen("home"); setTab("home");
          }, 400);
        };

        /* ─── Role gating ─── */
        if (role === null) {
          return (
            <React.Fragment>
              {showSplash && <Splash />}
              <PhoneFrame>
                <SignInScreen t={t} lang={lang} setLang={setLang}
                  onPickRole={(r) => {
                    setRole(r);
                    if (r === "patient") { setScreen("home"); setTab("home"); }
                  }} />
                <Toast message={toast} onDone={() => setToast(null)} />
              </PhoneFrame>
            </React.Fragment>
          );
        }
        if (role === "clinic" && !clinicUserId) {
          return (
            <PhoneFrame>
              <ClinicSignInScreen t={t}
                onPickClinic={(id) => setClinicUserId(id)}
                goBack={() => setRole(null)} />
              <Toast message={toast} onDone={() => setToast(null)} />
            </PhoneFrame>
          );
        }
        if (role === "clinic" && clinicUserId) {
          return (
            <PhoneFrame>
              <ClinicDashboardScreen clinicId={clinicUserId} t={t} lang={lang} setLang={setLang}
                bookings={bookings} blockedSet={blocked}
                onCancelBooking={(b) => {
                  setBookings((list) => list.filter((x) =>
                    (x.id || `${x.clinicId}|${x.date}|${x.slot}`) !== (b.id || `${b.clinicId}|${b.date}|${b.slot}`)
                  ));
                  showToast(t.clinicApptCancelled);
                }}
                onToggleBlock={toggleBlock}
                onSwitch={() => setClinicUserId(null)}
                onLogout={logoutClinic}
                darkMode={darkMode} setDarkMode={setDarkMode} />
              <Toast message={toast} onDone={() => setToast(null)} />
            </PhoneFrame>
          );
        }

        const showTabs = ["home","appointments","relatives","profile"].includes(screen);

        return (
          <React.Fragment>
            {showSplash && <Splash />}
            <PhoneFrame>
              {screen === "home" && (
                <HomeScreen lang={lang} setLang={setLang}
                            goSearch={goSearch} goClinic={(id)=>goClinic(id)}
                            query={query} setQuery={setQuery}
                            t={t} bookedSet={bookedSet} />
              )}
              {screen === "search" && (
                <SearchScreen goClinic={(id)=>goClinic(id)} goBack={goHome}
                              query={query} setQuery={setQuery}
                              lang={lang} t={t} bookedSet={bookedSet} />
              )}
              {screen === "clinic" && (
                <ClinicScreen clinicId={activeClinic} initialDate={activeDate}
                              goBack={() => setScreen("search")}
                              goConfirm={goConfirm}
                              t={t} bookedSet={bookedSet} />
              )}
              {screen === "confirmed" && (
                <ConfirmedScreen clinicId={activeClinic}
                                 date={activeDate || new Date()}
                                 slot={activeSlot}
                                 goHome={goHome} goAppts={goAppts} t={t} />
              )}
              {screen === "appointments" && (
                <AppointmentsScreen bookings={bookings}
                                    onCancel={cancelBooking}
                                    onReschedule={rescheduleBooking}
                                    goClinic={(id)=>goClinic(id)} t={t} />
              )}
              {screen === "relatives" && <RelativesScreen t={t} />}
              {screen === "profile" && (
                <ProfileScreen t={t} lang={lang} setLang={setLang}
                               darkMode={darkMode} setDarkMode={setDarkMode}
                               notifs={notifs} setNotifs={setNotifs}
                               insurance={insurance} setInsurance={setInsurance}
                               showToast={showToast} onLogout={logoutPatient} />
              )}
              {showTabs && <BottomTabs tab={tab} setTab={setTab} setScreen={setScreen} t={t} />}
              <Toast message={toast} onDone={() => setToast(null)} />
            </PhoneFrame>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<LokktPatientDemo />);
    </script>
  </body>
</html>
